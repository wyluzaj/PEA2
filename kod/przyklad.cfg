# ============================================================
# Plik konfiguracyjny dla PEA2 – Branch & Bound (TSP/ATSP)
# ============================================================
# Składnia:
#   klucz = wartość
#   Linie zaczynające się od '#' lub puste są ignorowane.
#   Wielkość liter w kluczach i wartościach nie ma znaczenia.
# ============================================================

# --- Ścieżka do pliku instancji ---
# Obsługiwane formaty:
#   - .tsp  (NODE_COORD_SECTION, EUC_2D)
#   - .atsp / .tsp z EDGE_WEIGHT_SECTION (FULL_MATRIX lub LOWER_DIAG_ROW)
INSTANCE_PATH = C:\Users\l6808\PEA2\kod\xdataset\wygenerowane\sym\sym_06.tsp

# --- Strategia przeszukiwania drzewa B&B ---
# Dozwolone wartości:
#   DFS     – przeszukiwanie w głąb (stos)
#   BFS     – przeszukiwanie wszerz (kolejka)
#   BestFS  – Best-First Search (kolejka priorytetowa, min LB/koszt)
SEARCH_TYPE = BestFS

# --- Typ algorytmu Branch & Bound ---
# Dozwolone wartości:
#
#   PLAIN_UB_INF
#     Bez dolnego ograniczenia (LB).
#     Górne ograniczenie startowe (UB) = INT_MAX.
#     Przycinanie wyłącznie po przekroczeniu aktualnego UB.
#
#   PLAIN_UB_RNN
#     Bez dolnego ograniczenia (LB).
#     Górne ograniczenie startowe (UB) wyznaczane zachłannie
#     algorytmem Repeated Nearest Neighbor (najlepsza trasa
#     spośród startów ze wszystkich wierzchołków).
#
#   LB_UB_RNN
#     Z dolnym ograniczeniem (LB) wyliczanym dla każdego węzła
#     (min wyjście z aktualnego + min powrót do startu
#      + (k-1) najmniejszych krawędzi wewnętrznych).
#     Górne ograniczenie startowe (UB) wyznaczane z RNN.
#     Najsilniejsze przycinanie – zalecane dla większych instancji.
ALGORITHM_TYPE = LB_UB_RNN
